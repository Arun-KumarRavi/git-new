# Client Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-client
  labels:
    app: accounts-dashboard-client
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: accounts-dashboard-client
  template:
    metadata:
      labels:
        app: accounts-dashboard-client
    spec:
      containers:
        - name: client
          image: "{{ .Values.image.client.repository }}:{{ .Values.image.client.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort.client }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app: accounts-dashboard-backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: accounts-dashboard-backend
  template:
    metadata:
      labels:
        app: accounts-dashboard-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort.backend }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
